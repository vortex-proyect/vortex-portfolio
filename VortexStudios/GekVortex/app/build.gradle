plugins { id 'com.android.application' }
android {
    namespace 'com.openkhaos.browser'
    compileSdk 34
    defaultConfig {
        applicationId "com.openkhaos.browser"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes { 
        release { 
            minifyEnabled true; 
            proguardFile 'proguard-rules.pro' 
        } 
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'org.mozilla.geckoview:geckoview-nightly:120.0'
}
